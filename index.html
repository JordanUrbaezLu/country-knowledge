<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Globe Royale — guess the country, beat your friends</title>
    <meta name="description" content="A fast, GeoGuessr-style globe game. Spot the country, race the clock, and compete with friends online — no sign-up." />

    <!-- Open Graph / link preview (when the room link is shared) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Globe Royale" />
    <meta property="og:description" content="Guess the country, race the clock, beat your friends. Tap to join — no sign-up." />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Globe Royale" />
    <meta name="twitter:description" content="Guess the country, race the clock, beat your friends. Tap to join — no sign-up." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- PWA / home-screen manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#05070f" />

    <!-- iOS home-screen icon & behaviour -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Globe Royale" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
